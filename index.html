<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Educational Pair Randomizer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    text-align:center;
}

h1{
    color:#1e3c72;
    margin-bottom:15px;
}

p{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:2px solid #ddd;
    border-radius:12px;
    font-size:18px;
    text-align:center;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1e3c72;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#2a5298;
}

.result{
    margin-top:25px;
    padding:20px;
    background:#f5f7ff;
    border-radius:15px;
}

.number{
    font-size:42px;
    font-weight:bold;
    color:#1e3c72;
    margin-top:10px;
}

.previous{
    color:#888;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
    <h1>Pair Randomizer</h1>

    <p>Enter the previous pair (Example: 12-45)</p>

    <input id="previousPair" placeholder="12-45">

    <button onclick="generatePair()">
        Generate Random Pair
    </button>

    <div class="result" id="result">
        Waiting for input...
    </div>
</div>

<script>

function pad(num){
    return num.toString().padStart(2,'0');
}

function generatePair(){

    const previous =
        document.getElementById("previousPair")
        .value.trim();

    let pair;

    do{

        let a = Math.floor(Math.random() * 40) + 1
        let b = Math.floor(Math.random() * 40) + 1

        pair = `${pad(a)}-${pad(b)}`;

    }while(pair === previous);

    document.getElementById("result").innerHTML = `
        <div class="previous">
            Previous: ${previous || "None"}
        </div>

        <div class="number">
            ${pair}
        </div>

        <p style="margin-top:10px;">
            Randomly generated educational sample
        </p>
    `;
}

</script>

</body>
</html>
